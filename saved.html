<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>محفوظ — عربي · إنجليزي</title>
    <link rel="stylesheet" href="./style.css" />
      <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <main class="app">
      <header class="header headerCompact">
        <h1 class="title titleCenter" lang="ar">البطاقات المحفوظة</h1>
        <div class="phraseToolbar deckToolbar" aria-label="محفوظ">
          <div class="stats phraseToolbar-stats">
            <div class="stat">
              <div class="statLabel" lang="ar">محفوظ</div>
              <div class="statValue" id="statTotal">—</div>
            </div>
            <div class="stat">
              <div class="statLabel" lang="ar">الرقم</div>
              <div class="statValue" id="statPosition">—</div>
            </div>
          </div>
          <nav class="phraseToolbar-nav" data-ar-nav data-ar-nav-current="saved" aria-label="القائمة الرئيسية"></nav>
          <nav class="phraseToolbar-nav" aria-label="إجراءات">
            <a class="btn ghost btnSm phraseToolbar-navBtn" href="./phrases-saved.html" lang="ar">جمل محفوظة</a>
            <button class="btn ghost btnSm phraseToolbar-navBtn" id="removeSavedBtn" type="button" lang="ar">حذف</button>
          </nav>
        </div>
      </header>

      <section class="stage">
        <section class="panel studyPanel" aria-label="Saved flashcards">
          <div class="studyRow" role="group" aria-label="Card controls">
            <div class="studyControlBar studyControlBar--solo">
              <button type="button" class="btn navBtn primary studyNextBtn" id="stepBtn">Flip ▸</button>
            </div>
          </div>

          <div class="flashcardStage">
            <button
              type="button"
              class="flashcardHit"
              id="flashcardHit"
              aria-label="Flashcard — click to flip"
            >
              <div class="flashcard3d">
                <div class="flashcardInner" id="flashcardInner">
                                    <div class="flashFace flashFaceFront">
                    <span class="flashLabel">Arabic</span>
                    <p class="flashWord flashWordAr" id="textAr">—</p>
                    <span class="flashCornerTag" id="cornerTag">—</span>
                  </div>
                  <div class="flashFace flashFaceBack">
                    <span class="flashLabel">English</span>
                    <p class="flashWord" id="textEnBack">—</p>
                  </div>
                </div>
              </div>
            </button>
          </div>

          <p class="deckHelpNote muted">
            Same as main: <kbd>←</kbd> flip · <kbd>→</kbd> flip then next · <kbd>Delete</kbd> or <kbd>Backspace</kbd>
            removes from this saved list only (not from your main deck).
          </p>
        </section>
      </section>

      <footer class="footer footerBar">
        <span class="muted">Saved list syncs with the main page in this browser.</span>
      </footer>
    </main>

    <script src="./english-display.js"></script>
    <script src="./saved.js" defer></script>
    <script src="./mobile-deck.js" defer></script>
      <script src="./site-nav.js" defer></script>
  </body>
</html>
