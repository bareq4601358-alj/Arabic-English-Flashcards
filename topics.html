<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Topics — Arabic · English Flashcards</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <main class="app">
      <header class="header headerCompact">
        <h1 class="title titleCenter" lang="ar" dir="rtl">المواضيع</h1>
        <p class="subtitle subtitleTight desktopOnlyControl" lang="ar" dir="rtl">
          اختر موضوعاً للدراسة — كل بطاقة في مكانها الصحيح. البطاقات المحفوظة والمخفية مشتركة مع
          <a class="muted inlineLink" href="./index.html">المجموعة الرئيسية</a>.
        </p>
        <nav class="stats statsRow" data-site-nav data-site-nav-current="topics" aria-label="Navigation"></nav>
      </header>

      <section class="stage">
        <section class="panel studyPanel topicHubPanel" aria-label="Topic list">
          <p class="studyHint muted studyHintSolo" id="topicHubIntro">
            Loading topics…
          </p>
          <div class="topicHubSections" id="topicHubSections" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <script src="./topics-data.js"></script>
    <script src="./topics-hub.js"></script>
    <script src="./site-nav.js" defer></script>
    <script src="./english-display.js"></script>
    <script src="./wordbank.js" defer></script>
  </body>
</html>
