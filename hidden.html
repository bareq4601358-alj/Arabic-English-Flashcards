<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Hidden — Arabic · English</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header headerCompact">
        <h1 class="title titleCenter">Hidden cards</h1>
        <p class="subtitle subtitleTight desktopOnlyControl">
          Cards you hid from your decks appear here. Open a list and use <strong>Retrieve</strong> to restore any
          card.
        </p>
        <div class="hiddenHub">
          <a class="hiddenHubCard btn ghost" href="./hidden-words.html">
            <span class="hiddenHubTitle">Hidden vocabulary</span>
            <span class="hiddenHubMeta muted"><span id="countWords">0</span> hidden</span>
          </a>
          <a class="hiddenHubCard btn ghost" href="./hidden-sentences.html">
            <span class="hiddenHubTitle">Hidden sentences</span>
            <span class="hiddenHubMeta muted"><span id="countSentences">0</span> hidden</span>
          </a>
        </div>
        <nav class="stats statsRow" data-site-nav data-site-nav-current="hidden" aria-label="Navigation"></nav>
      </header>
    </main>
    <script src="./hidden-hub.js" defer></script>
      <script src="./site-nav.js" defer></script>
  </body>
</html>
