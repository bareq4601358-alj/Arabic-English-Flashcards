<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>موضوع — عربي · إنجليزي</title>
    <link rel="stylesheet" href="./style.css" />
      <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <main class="app">
      <header class="header headerCompact">
        <h1 class="title titleCenter" id="topicStudyHeading">Topic study</h1>
        <p class="subtitle subtitleTight desktopOnlyControl" id="topicStudySubtitle">
          Subset of your main deck by topic. Full deck is unchanged on
          <a class="muted inlineLink" href="./index.html">Main deck</a>.
        </p>
        <nav class="stats statsRow" data-ar-nav data-ar-nav-current="topics" aria-label="القائمة الرئيسية"></nav>
      </header>

      <section class="stage">
        <section class="panel studyPanel" aria-label="Topic study">
          <div class="studyRow" role="group" aria-label="Card controls">
            <div class="studyControlBar studyControlBar--solo">
              <button type="button" class="btn navBtn primary studyNextBtn" id="stepBtn" lang="ar">اقلب ▸</button>
            </div>
          </div>

          <div class="flashcardStage">
            <button
              type="button"
              class="flashcardHit"
              id="flashcardHit"
              aria-label="Flashcard — click to flip"
            >
              <div class="flashcard3d">
                <div class="flashcardInner" id="flashcardInner">
                                    <div class="flashFace flashFaceFront">
                    <span class="flashLabel" lang="ar">عربي</span>
                    <p class="flashWord flashWordAr" id="textAr">—</p>
                    <span class="flashCornerTag" id="deckTag">—</span>
                  </div>
                  <div class="flashFace flashFaceBack">
                    <span class="flashLabel" lang="en" dir="ltr">English</span>
                    <p class="flashWord" id="textEnBack">—</p>
                  </div>
                </div>
              </div>
            </button>
          </div>

          <div class="miniHelp" id="toastBar">
            <span id="saveToast" class="saveToast" aria-live="polite"></span>
          </div>
        </section>
      </section>
    </main>

    <script src="./topics-data.js"></script>
    <script src="./english-display.js"></script>
    <script src="./wordbank.js" defer></script>
    <script src="./topic-main.js" defer></script>
    <script src="./mobile-deck.js" defer></script>
      <script src="./site-nav.js" defer></script>
  </body>
</html>
