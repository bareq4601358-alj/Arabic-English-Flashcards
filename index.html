<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>بطاقات عربي · إنجليزي</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="deckPage">
    <main class="app">
      <header class="header headerCompact">
        <h1 class="title titleCenter" lang="ar">بطاقات عربي · إنجليزي</h1>
        <div class="phraseToolbar deckToolbar" aria-label="المجموعة">
          <div class="stats phraseToolbar-stats">
            <div class="stat">
              <div class="statLabel" lang="ar">في المجموعة</div>
              <div class="statValue" id="statDeck">—</div>
            </div>
            <a class="stat statLink" href="./saved.html" title="البطاقات المحفوظة">
              <div class="statLabel" lang="ar">محفوظ</div>
              <div class="statValue" id="statSaved">—</div>
            </a>
            <a class="stat statLink" href="./hidden.html" title="البطاقات المخفية">
              <div class="statLabel" lang="ar">مخفي</div>
              <div class="statValue" id="statRemoved">—</div>
            </a>
          </div>
          <div class="phraseToolbar-actions">
            <div class="phraseToolbar-actionsInner">
              <nav
                class="phraseToolbar-nav"
                data-ar-nav
                data-ar-nav-current="home"
                aria-label="أوضاع الدراسة"
              ></nav>
              <nav class="phraseToolbar-nav" aria-label="إجراءات">
                <button
                  class="btn ghost btnSm phraseToolbar-navBtn"
                  id="saveBtn"
                  type="button"
                  title="اختصار: S"
                  lang="ar"
                >
                  حفظ
                </button>
                <button
                  class="btn danger btnSm phraseToolbar-navBtn"
                  id="hideCardBtn"
                  type="button"
                  title="إخفاء من المجموعة في هذا المتصفح"
                  lang="ar"
                >
                  إخفاء
                </button>
              </nav>
            </div>
          </div>
        </div>
      </header>

      <section class="stage">
        <section class="panel studyPanel" aria-label="دراسة">
          <div class="studyRow" role="group" aria-label="موضوع والبطاقة">
            <div class="studyControlBar">
              <div class="topicDrop" id="topicDrop">
                <button
                  type="button"
                  class="btn navBtn primary topicDropBtn"
                  id="topicDropBtn"
                  aria-haspopup="listbox"
                  aria-expanded="false"
                  aria-controls="topicDropMenu"
                >
                  <span class="topicDropBtnText" id="topicDropLabel" lang="ar">كل البطاقات</span>
                  <span class="topicDropChev" aria-hidden="true">▾</span>
                </button>
                <div
                  class="topicDropMenu"
                  id="topicDropMenu"
                  role="listbox"
                  aria-label="اختر موضوعاً"
                  hidden
                ></div>
              </div>
              <button
                type="button"
                class="btn navBtn primary studyFlipBtn desktopOnlyControl"
                id="stepBtn"
                lang="ar"
              >
                اقلب ▸
              </button>
            </div>
          </div>

          <div class="flashcardStage">
            <button
              type="button"
              class="flashcardHit"
              id="flashcardHit"
              aria-label="البطاقة — اضغط للقلب"
            >
              <div class="flashcard3d">
                <div class="flashcardInner" id="flashcardInner">
                  <div class="flashFace flashFaceFront">
                    <span class="flashLabel" lang="ar">عربي</span>
                    <p class="flashWord flashWordAr" id="textAr">—</p>
                    <span class="flashCornerTag" id="deckTag">—</span>
                  </div>
                  <div class="flashFace flashFaceBack">
                    <span class="flashLabel" lang="en" dir="ltr">English</span>
                    <p class="flashWord" id="textEnBack" dir="ltr">—</p>
                  </div>
                </div>
              </div>
            </button>
          </div>

          <p class="deckHelpNote muted" lang="ar">
            قلب: نقرة أو <kbd>←</kbd> · التالي: <kbd>→</kbd> · حفظ: <kbd>S</kbd> · إخفاء:
            <kbd>Delete</kbd> أو زر إخفاء. للمراجعة والحذف:
            <a class="muted inlineLink" href="./curate.html">مراجعة الكلمات</a>.
          </p>

          <div class="miniHelp" id="toastBar">
            <span id="saveToast" class="saveToast" aria-live="polite"></span>
          </div>
        </section>
      </section>
    </main>

    <script src="./topics-data.js"></script>
    <script src="./english-display.js"></script>
    <script src="./wordbank.js" defer></script>
    <script src="./site-nav.js" defer></script>
    <script src="./main.js" defer></script>
    <script src="./mobile-deck.js" defer></script>
  </body>
</html>
