<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Hidden sentences</title>
    <link rel="stylesheet" href="./style.css" />
      <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;700&display=swap" rel="stylesheet" />
  </head>
  <body class="phrasePage">
    <main class="app">
      <header class="header headerCompact">
        <h1 class="title titleCenter">Hidden sentences</h1>
        <p class="subtitle subtitleTight desktopOnlyControl">
          <kbd>←</kbd> flip · <kbd>→</kbd> flip then next · <strong>Retrieve</strong> puts this sentence back into your
          main sentence deck.
        </p>
        <nav class="stats statsRow" data-site-nav data-site-nav-current="hidden" aria-label="Navigation"></nav>
      </header>

      <section class="stage">
        <section class="panel studyPanel" aria-label="Hidden sentence cards">
          <div class="studyRow" role="group" aria-label="Card controls">
            <div class="studyControlBar studyControlBar--solo">
              <button type="button" class="btn navBtn primary studyNextBtn" id="stepBtn">Flip ▸</button>
            </div>
          </div>

          <div class="flashcardStage">
            <button
              type="button"
              class="flashcardHit"
              id="flashcardHit"
              aria-label="Sentence flashcard — click to flip"
            >
              <div class="flashcard3d">
                <div class="flashcardInner" id="flashcardInner">
                                    <div class="flashFace flashFaceFront">
                    <span class="flashLabel">Arabic</span>
                    <p class="flashWord flashWordAr" id="textAr">—</p>
                    <span class="flashCornerTag" id="cornerTag">—</span>
                  </div>
                  <div class="flashFace flashFaceBack">
                    <span class="flashLabel">English</span>
                    <p class="flashWord" id="textEnBack">—</p>
                  </div>
                </div>
              </div>
            </button>
          </div>

        </section>
      </section>
    </main>

    <script src="./english-display.js"></script>
    <script src="./sentence-bank.js" defer></script>
    <script src="./hidden-sentences.js" defer></script>
    <script src="./mobile-deck.js" defer></script>
      <script src="./site-nav.js" defer></script>
  </body>
</html>
